<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Float Radar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <img class="hero-image" src="images/hero.jpg" alt="Float Radar hero" />
    <div class="hero-overlay"></div>

    <div class="hero-topbar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <span class="brand-text">Float Radar</span>
      </div>

      <nav class="top-nav" aria-label="Primary">
        <a href="#" class="nav-link">Your Map</a>
        <button id="refreshBtn" class="nav-button" type="button">Refresh Data</button>
      </nav>
    </div>

    <div class="hero-inner">
      <p class="eyebrow">Arkansas River Conditions</p>
      <h1>Find the Best Rivers to Float in Arkansas</h1>
      <p class="hero-text">
        Quick river conditions for beginner-friendly float planning.
      </p>

      <div class="hero-search-wrap">
        <label class="sr-only" for="riverSearch">Search rivers</label>
        <input
          id="riverSearch"
          class="hero-search"
          type="search"
          placeholder="Search rivers..."
          autocomplete="off"
        />
      </div>

      <p id="lastUpdated" class="last-updated">Loading latest conditions...</p>
    </div>
  </header>

  <main class="app-shell">
    <section id="messageBox" class="message-box hidden" aria-live="polite"></section>

    <section id="detailSection" class="detail-section hidden">
      <div class="detail-card">
        <div class="detail-head">
          <div>
            <p id="detailRiver" class="detail-river"></p>
            <h2 id="detailSectionName" class="detail-section-name"></h2>
          </div>
          <button id="closeDetailBtn" class="detail-close" type="button">Close</button>
        </div>

        <div class="detail-stats">
          <div class="detail-stat">
            <span class="detail-stat-label">Level</span>
            <span id="detailLevel" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Flow</span>
            <span id="detailFlow" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Water Temp</span>
            <span id="detailWaterTemp" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Air</span>
            <span id="detailAirTemp" class="detail-stat-value">--</span>
          </div>
        </div>

        <div class="detail-meta">
          <p id="detailCondition" class="detail-condition"></p>
          <p id="detailRange" class="detail-range"></p>
          <p id="detailNotes" class="detail-notes"></p>
          <a id="detailUsgsLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">Open source data →</a>
        </div>
      </div>
    </section>

    <section class="section-header">
      <p class="section-kicker">Dashboard</p>
      <h2>River Sections</h2>
    </section>

    <section id="riverGrid" class="river-grid" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
