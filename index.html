<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Float Radar</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <h1>Float Radar</h1>
    <p>Live river conditions. Simple decisions.</p>
  </div>
</header>

<main class="container">

  <div class="top-bar">
    <button id="refreshBtn">Refresh</button>
    <span id="lastUpdated">Loading...</span>
  </div>

  <div id="riverGrid" class="grid"></div>

</main>

<template id="cardTemplate">
  <div class="card">
    <h3 class="name"></h3>
    <p class="section"></p>

    <div class="big">
      <span class="gauge">--</span>
    </div>

    <div class="status"></div>

    <div class="row">
      <span>Flow</span>
      <span class="flow">--</span>
    </div>

    <div class="row">
      <span>Temp</span>
      <span class="temp">--</span>
    </div>

    <p class="note"></p>
  </div>
</template>

<script src="script.js"></script>
</body>
</html>
