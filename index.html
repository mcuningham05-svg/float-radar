<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Float Radar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-inner">
      <div class="hero-copy">
        <p class="eyebrow">Arkansas River Conditions</p>
        <h1>Float Radar</h1>
        <p class="hero-text">
          Live river levels, weather, and float guidance for real river sections.
        </p>

        <div class="hero-actions">
          <button id="refreshBtn" type="button">Refresh Data</button>
          <p id="lastUpdated">Loading latest conditions...</p>
        </div>
      </div>

      <div class="hero-panel">
        <div class="hero-stat">
          <span class="hero-stat-label">Status</span>
          <span class="hero-stat-value">Live</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-label">Source</span>
          <span class="hero-stat-value">USGS + Weather</span>
        </div>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section id="messageBox" class="message-box hidden"></section>

    <section class="section-header">
      <div>
        <p class="section-kicker">Dashboard</p>
        <h2>River Sections</h2>
      </div>
    </section>

    <section id="riverGrid" class="river-grid"></section>
  </main>

  <template id="riverCardTemplate">
    <article class="river-card">
      <div class="card-image-wrap">
        <img class="river-image" src="" alt="" />
      </div>

      <div class="card-body">
        <div class="card-header">
          <div>
            <p class="card-kicker">Section</p>
            <h3 class="river-name"></h3>
            <p class="river-section"></p>
          </div>
          <span class="status-badge"></span>
        </div>

        <div class="gauge-panel">
          <div>
            <p class="gauge-label">Gauge</p>
            <p class="gauge-height">--</p>
          </div>
          <div class="gauge-side">
            <p class="gauge-label">Float Read</p>
            <p class="gauge-summary"></p>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-box">
            <span class="stat-label">Flow</span>
            <span class="discharge">--</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Water Temp</span>
            <span class="temp">--</span>
          </div>
        </div>

        <div class="weather-panel">
          <div class="weather-top">
            <div>
              <p class="weather-label">Area Weather</p>
              <p class="weather-current">Loading weather...</p>
            </div>
            <p class="weather-summary"></p>
          </div>
          <div class="weather-strip"></div>
        </div>

        <div class="info-stack">
          <p class="recommendation-text"></p>
          <p class="range-text"></p>
          <p class="notes"></p>
        </div>

        <a class="usgs-link" href="#" target="_blank" rel="noopener noreferrer">View Gauge</a>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
