<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Float Radar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <img class="hero-image" src="images/hero.jpg" alt="Float Radar hero" />
    <div class="hero-overlay"></div>

    <div class="hero-topbar">
      <div class="brand">
        <span class="brand-mark">✦</span>
        <span class="brand-text">Float Radar</span>
      </div>

      <nav class="top-nav" aria-label="Primary">
        <a href="#" class="nav-link">Your Map</a>
        <button id="refreshBtn" class="nav-button" type="button">Refresh Data</button>
      </nav>
    </div>

    <div class="hero-inner">
      <p class="eyebrow">Arkansas River Conditions</p>
      <h1>Find the Best Rivers to Float in Arkansas</h1>
      <p class="hero-text">
        Quick river conditions for beginner-friendly float planning.
      </p>

      <div class="hero-search-wrap">
        <label class="sr-only" for="riverSearch">Search rivers</label>
        <input
          id="riverSearch"
          class="hero-search"
          type="search"
          placeholder="Search rivers..."
          autocomplete="off"
        />
      </div>

      <p id="lastUpdated" class="last-updated">Loading latest conditions...</p>
    </div>
  </header>

  <main class="app-shell">
    <section id="messageBox" class="message-box hidden" aria-live="polite"></section>

    <section class="section-header">
      <p class="section-kicker">Dashboard</p>
      <h2>River Sections</h2>
    </section>

    <section id="riverGrid" class="river-grid" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
  <script src="script.js"></script>
</body>
</html>
