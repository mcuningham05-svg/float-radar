<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Float Radar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <img class="hero-image" src="images/hero.jpg" alt="Float Radar hero" />
    <div class="hero-overlay"></div>

    <div class="hero-topbar">
      <div class="brand">
        <img
          class="brand-logo"
          src="images/float-radar-logo.png"
          alt="Float Radar"
        />
      </div>

      <aside class="hero-tip-box" aria-live="polite">
        <p class="hero-tip-label">Float Tip</p>
        <p id="heroTipText" class="hero-tip-text">Drink lots of water.</p>
      </aside>
    </div>

    <div class="hero-inner">
      <p class="eyebrow">ARKANSAS RIVER CONDITIONS</p>

      <h1>
        Find the Best Rivers to<br />
        Float in Arkansas
      </h1>

      <p class="hero-text">
        Quick river conditions for beginner-friendly float planning.
      </p>

      <div class="hero-search-wrap">
        <label class="sr-only" for="riverSearch">Search rivers</label>
        <input
          id="riverSearch"
          class="hero-search"
          type="search"
          placeholder="Search rivers..."
          autocomplete="off"
        />
      </div>

      <p id="lastUpdated" class="last-updated">Updated just now</p>
    </div>
  </header>

  <main class="app-shell">
    <section id="messageBox" class="message-box hidden" aria-live="polite"></section>
    <section id="riverGrid" class="river-grid" aria-live="polite"></section>
  </main>

  <script src="status.js"></script>
  <script src="script.js"></script>
</body>
</html>
