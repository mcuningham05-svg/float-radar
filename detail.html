<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Float Radar Report</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="messageBox" class="message-box hidden" aria-live="polite"></section>

    <section class="section-header">
      <p class="section-kicker">River Report</p>
      <h2 id="detailTitle">Loading...</h2>
    </section>

    <section id="detailPage" class="detail-section">
      <div class="detail-card">
        <div class="detail-head">
          <div>
            <p id="detailRiver" class="detail-river"></p>
            <h2 id="detailSectionName" class="detail-section-name"></h2>
          </div>
          <a href="index.html" class="detail-close">Back</a>
        </div>

        <div class="detail-stats">
          <div class="detail-stat">
            <span class="detail-stat-label">Level</span>
            <span id="detailLevel" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Flow</span>
            <span id="detailFlow" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Water Temp</span>
            <span id="detailWaterTemp" class="detail-stat-value">--</span>
          </div>
          <div class="detail-stat">
            <span class="detail-stat-label">Air</span>
            <span id="detailAirTemp" class="detail-stat-value">--</span>
          </div>
        </div>

        <div class="detail-meta">
          <p id="detailCondition" class="detail-condition"></p>
          <p id="detailRange" class="detail-range"></p>
          <p id="detailNotes" class="detail-notes"></p>
          <a id="detailUsgsLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">Open source data →</a>
        </div>
      </div>
    </section>
  </main>

  <script src="detail.js"></script>
</body>
</html>
